<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/default}">
<head>
  <title>글 작성</title>
</head>
<body>
<main layout:fragment="content">
  <h1>글 작성</h1>

  <form th:action="@{/boards}" th:object="${boardForm}" method="post">
    <div class="mb-3">
      <label for="title" class="form-label">제목</label>
      <input type="text" class="form-control" id="title" th:field="*{title}" th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
      <div class="invalid-feedback" th:if="${#fields.hasErrors('title')}" th:errors="*{title}">에러 메시지</div>
    </div>

    <div class="mb-3">
      <label for="content" class="form-label">내용</label>
      <textarea class="form-control" id="content" rows="10" th:field="*{content}" th:classappend="${#fields.hasErrors('content')} ? 'is-invalid'"></textarea>
      <div class="invalid-feedback" th:if="${#fields.hasErrors('content')}" th:errors="*{content}">에러 메시지</div>
    </div>

    <div class="mb-3">
      <label for="writer" class="form-label">작성자</label>
      <input type="text" class="form-control" id="writer" th:field="*{writer}" th:classappend="${#fields.hasErrors('writer')} ? 'is-invalid'">
      <div class="invalid-feedback" th:if="${#fields.hasErrors('writer')}" th:errors="*{writer}">에러 메시지</div>
    </div>

    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-primary">저장</button>
      <a th:href="@{/boards}" class="btn btn-secondary">취소</a>
    </div>
  </form>
</main>
</body>
</html>
